<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>B站首页清屏</title>
    <style>
      body {
        min-width: 180px;
        margin: 0;
        padding: 14px;
        color: #18191c;
        font: 14px/1.5 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #fff;
      }

      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
      }

      .title {
        font-weight: 600;
      }

      .state {
        margin-top: 8px;
        color: #61666d;
        font-size: 12px;
      }

      .switch {
        position: relative;
        width: 42px;
        height: 24px;
      }

      .switch input {
        position: absolute;
        opacity: 0;
      }

      .slider {
        position: absolute;
        inset: 0;
        border-radius: 999px;
        background: #c9ccd0;
        cursor: pointer;
        transition: background 0.15s ease;
      }

      .slider::before {
        content: "";
        position: absolute;
        top: 3px;
        left: 3px;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: #fff;
        box-shadow: 0 1px 3px rgb(0 0 0 / 20%);
        transition: transform 0.15s ease;
      }

      input:checked + .slider {
        background: #fb7299;
      }

      input:checked + .slider::before {
        transform: translateX(18px);
      }
    </style>
  </head>
  <body>
    <div class="row">
      <div class="title">首页推荐</div>
      <label class="switch" aria-label="切换首页推荐隐藏">
        <input id="enabled" type="checkbox">
        <span class="slider"></span>
      </label>
    </div>
    <div id="state" class="state">已隐藏</div>
    <script src="popup.js"></script>
  </body>
</html>
